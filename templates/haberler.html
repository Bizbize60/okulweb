<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haberler - THKÜ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #181c24 0%, #232a3a 100%);
            color: #eaf0fa;
            font-family: 'Montserrat', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .glass-container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(30, 36, 54, 0.55);
            border-radius: 32px;
            box-shadow: 0 8px 48px #0a0a1a88, 0 1.5px 8px #0a0a1a44;
            padding: 48px 32px 32px 32px;
            margin-top: 60px;
            margin-bottom: 60px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            position: relative;
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
        }

        .glass-tabs {
            position: absolute;
            right: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .glass-tab {
            background: rgba(40, 50, 80, 0.7);
            color: #b6c8e6;
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 1.1rem;
            padding: 8px 18px 8px 18px;
            border-radius: 0 0 18px 18px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px #0a0a1a44;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            user-select: none;
            transition: background .2s, color .2s;
            text-shadow: 0 2px 8px #232a3a99;
        }

        .glass-tab.active,
        .glass-tab:hover {
            background: rgba(60, 80, 120, 0.9);
            color: #fff;
        }

        .section-title {
            font-size: 2.7rem;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #eaf0fa;
            text-align: left;
            margin-top: 0;
            margin-bottom: 8px;
            text-shadow: 0 2px 24px #0a0a1a99, 0 1px 0 #fff1;
            padding-left: 48px;
        }

        .section-desc {
            color: #b6c8e6;
            font-size: 1.25rem;
            text-align: left;
            margin-bottom: 40px;
            margin-left: 48px;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .news-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 48px 40px;
            justify-content: center;
            margin: 0 auto;
            max-width: 900px;
        }

        .news-card {
            background: rgba(36, 44, 66, 0.55);
            border-radius: 22px;
            box-shadow: 0 2px 32px #0a0a1a55, 0 1.5px 8px #0a0a1a33, 0 0 0 2px #3a7bd5cc;
            min-width: 380px;
            max-width: 420px;
            flex: 1 1 340px;
            min-height: 380px;
            margin-bottom: 18px;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1.5px solid rgba(255, 255, 255, 0.10);
            transition: box-shadow .3s, transform .3s, border .3s;
            opacity: 0;
            animation: fadeInCard .9s cubic-bezier(.4, 1.4, .6, 1) forwards;
            backdrop-filter: blur(12px) saturate(1.2);
            -webkit-backdrop-filter: blur(12px) saturate(1.2);
        }

        .news-card:hover {
            box-shadow: 0 8px 48px #3a7bd5cc, 0 0 80px #232a3a99;
            border: 1.5px solid #3a7bd5;
            transform: translateY(-7px) scale(1.025) rotateZ(-0.5deg);
        }

        @keyframes fadeInCard {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .news-img {
            width: 100%;
            aspect-ratio: 16/10;
            height: 220px;
            max-height: 320px;
            min-height: 120px;
            object-fit: contain;
            background: #232a3a;
            display: block;
            margin: 0 auto;
            border-radius: 18px 18px 0 0;
            box-shadow: 0 2px 16px #0a0a1a22;
        }

        .news-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 28px 20px 28px;
        }

        .news-title {
            font-size: 1.32rem;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 800;
            margin-bottom: 10px;
            color: #eaf0fa;
            text-shadow: 0 2px 12px #3a7bd5cc, 0 1px 0 #fff1;
            letter-spacing: -0.01em;
        }

        .news-desc {
            font-size: 1.09rem;
            color: #b6c8e6;
            margin-bottom: 18px;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 500;
        }

        .news-date {
            font-size: 1.05rem;
            color: #7ea1d6;
            margin-bottom: 12px;
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .news-actions {
            margin-top: auto;
        }

        .news-btn {
            display: inline-block;
            background: linear-gradient(90deg, #3a7bd5 0%, #232a3a 100%);
            color: #fff;
            border-radius: 10px;
            padding: 10px 28px;
            font-family: 'Montserrat', Arial, sans-serif;
            font-weight: 700;
            font-size: 1.08rem;
            text-decoration: none;
            box-shadow: 0 0 0 1.5px #3a7bd5cc, 0 4px 12px #232a3a88;
            transition: background .2s, box-shadow .2s, transform .2s, filter .2s;
            filter: drop-shadow(0 2px 8px #3a7bd5aa);
        }

        .news-btn:hover {
            background: linear-gradient(90deg, #232a3a 0%, #3a7bd5 100%);
            box-shadow: 0 0 0 2px #3a7bd5, 0 8px 24px #232a3a99;
            transform: scale(1.06) translateY(-2px);
            filter: brightness(1.08);
        }

        .sketch-loading {
            width: 100%;
            text-align: center;
            font-family: 'Montserrat', Arial, sans-serif;
            color: #3a7bd5;
            font-size: 1.2rem;
            padding: 48px 0;
            animation: glassGlow 1.2s infinite alternate;
        }

        @keyframes glassGlow {
            from {
                opacity: 0.5;
                text-shadow: 0 0 8px #3a7bd5cc;
            }

            to {
                opacity: 1;
                text-shadow: 0 0 24px #3a7bd5cc;
            }
        }

        .loader-circle {
            width: 38px;
            height: 38px;
            border: 4px solid #3a7bd5;
            border-top: 4px solid #eaf0fa;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .news-grid {
                flex-direction: column;
                gap: 24px 0;
            }

            .glass-container {
                padding: 24px 6px 18px 6px;
            }

            .section-title,
            .section-desc {
                padding-left: 18px;
                margin-left: 0;
            }
        }

        @media (max-width: 1100px) {
            .news-grid {
                max-width: 98vw;
                gap: 32px 12px;
            }

            .news-card {
                min-width: 320px;
                max-width: 98vw;
            }
        }
    </style>
</head>

<body class="bg-layered grid-overlay text-[#EDEDEF] min-h-screen font-sans antialiased overflow-x-hidden">
    <main style="margin-top:60px;">
        <div class="glass-container">
            <!-- Tabs removed as requested -->
            <div class="section-title">Tüm Haberler</div>
            <div class="section-desc">Üniversitemizden en güncel haberler, etkinlikler ve duyurular burada. Her
                gelişmeden anında haberdar olun!</div>
            <div class="news-grid" id="newsGrid" style="display:none;"></div>
            <div id="newsLoading" class="sketch-loading">
                <div class="loader-circle"></div>
                <div>Yükleniyor...</div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">THKÜ Öğrenci Portalı — Öğrenciler tarafından, öğrenciler için geliştirildi.</p>
            <div class="footer-links">
                <a href="/kroki" class="footer-link">Kampüs Krokisi</a>
                <a href="/ofis-saatleri" class="footer-link">Ofis Saatleri</a>
                <a href="/yemekhane" class="footer-link">Yemekhane</a>
            </div>
        </div>
    </footer>
    <script>
        const grid = document.getElementById('newsGrid');
        const loading = document.getElementById('newsLoading');
        function showLoading() {
            loading.style.display = 'block';
            grid.style.display = 'none';
        }
        function hideLoading() {
            loading.style.display = 'none';
            grid.style.display = 'flex';
        }
        showLoading();
        fetch('/api/haberler')
            .then(r => r.json())
            .then(data => {
                grid.innerHTML = '';
                if (data.articles && data.articles.length > 0) {
                    data.articles.forEach(haber => {
                        let imgSrc = haber.thumbnail || '/static/default-news.jpg';
                        if (imgSrc && imgSrc.startsWith('/images/')) {
                            imgSrc = 'https://www.thk.edu.tr' + imgSrc;
                        }
                        const card = document.createElement('div');
                        card.className = 'news-card';
                        card.innerHTML = `
                            <img class=\"news-img\" src=\"${imgSrc}\" alt=\"${haber.title}\">
                            <div class=\"news-content\">
                                <div class=\"news-title\">${haber.title}</div>
                                <div class=\"news-desc\">${haber.content ? haber.content : ''}</div>
                                <div class=\"news-date\">${haber.source || ''}</div>
                                <div class=\"handwritten-meta\">${haber.meta ? haber.meta : ''}</div>
                                <div class=\"news-actions\">
                                    <a class=\"news-btn\" href=\"${haber.link}\" target=\"_blank\" rel=\"noopener\">Oku</a>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<div class="sketch-loading">Şu anda haber bulunamadı.<br><span style="font-size:1.5em;">✏️</span></div>';
                }
                hideLoading();
            })
            .catch(() => { hideLoading(); });
    </script>
</body>

</html>
