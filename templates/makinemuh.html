<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makine Mühendisliği Kulübü</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Marcellus&family=Josefin+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A;
      --fg: #F2F0E4;
      --card: #141414;
      --gold: #D4AF37;
      --blue: #1E3D59;
      --muted: #888888;
    }

    * {
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Josefin Sans', system-ui, sans-serif;
    }

    /* Subtle gold crosshatch texture */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        repeating-linear-gradient(45deg, rgba(212, 175, 55, .3) 0 2px, transparent 2px 8px),
        repeating-linear-gradient(-45deg, rgba(212, 175, 55, .3) 0 2px, transparent 2px 8px);
    }

    a {
      color: var(--gold);
      text-decoration: underline
    }

    a:hover {
      color: #F2E8C4
    }

    /* Window card (Art Deco) */
    .window {
      max-width: 1120px;
      margin: 20px auto;
      background: var(--card);
      border: 1px solid var(--gold);
      box-shadow: 0 0 15px rgba(212, 175, 55, .2)
    }

    .titlebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: linear-gradient(90deg, #0b0b0b, #141414);
      border-bottom: 1px solid rgba(212, 175, 55, .4)
    }

    .title {
      font-family: 'Marcellus', serif;
      font-size: 32px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold)
    }

    .diamond {
      width: 48px;
      height: 48px;
      transform: rotate(45deg);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .diamond img {
      transform: rotate(-45deg);
      width: 34px;
      height: 34px;
      object-fit: cover;
    }

    .content {
      padding: 16px
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, .5), transparent);
      margin: 12px 0
    }

    /* Hero */
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px
    }

    .hero-frame {
      border: 1px solid var(--gold);
      padding: 8px
    }

    .hero-inner {
      background: #0f0f0f;
      border: 8px solid #0A0A0A
    }

    .hero-img {
      width: 100%;
      height: 320px;
      display: block;
      object-fit: cover;
      filter: grayscale(40%)
    }

    .hero-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted)
    }

    .hero-title {
      font-family: 'Marcellus', serif;
      color: var(--gold);
      letter-spacing: .15em;
      text-transform: uppercase
    }

    /* Archive grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px
    }

    .card {
      background: #0f0f0f;
      border: 1px solid rgba(212, 175, 55, .4);
      transition: transform 500ms ease, border-color 300ms ease
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--gold)
    }

    .card-head {
      padding: 12px;
      border-bottom: 1px solid rgba(212, 175, 55, .3)
    }

    .card-title {
      font-family: 'Marcellus', serif;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 18px
    }

    .card-body {
      padding: 12px
    }

    .thumb {
      height: 160px;
      border: 6px solid #0A0A0A;
      background: #0c0c0c
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(40%)
    }

    /* Table (Art Deco) */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid rgba(212, 175, 55, .35);
      padding: 10px;
      text-align: left
    }

    th {
      color: var(--gold);
      font-family: 'Marcellus', serif;
      text-transform: uppercase;
      letter-spacing: .15em;
      background: #101010
    }

    tr:nth-child(odd) {
      background: #0e0e0e
    }

    tr:nth-child(even) {
      background: #0b0b0b
    }

    /* Responsive */
    @media (max-width: 920px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-img {
        height: 260px
      }
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero-img {
        height: 200px
      }

      .title {
        font-size: 26px
      }
    }

    /* Lightbox Modal */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out
    }

    .lightbox.show {
      display: flex
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 2px solid var(--gold);
      box-shadow: 0 0 30px rgba(212, 175, 55, .3)
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: var(--gold);
      font-size: 40px;
      cursor: pointer;
      transition: transform 200ms
    }

    .lightbox-close:hover {
      transform: scale(1.2)
    }

    .lightbox-caption {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--fg);
      font-family: 'Marcellus', serif;
      text-align: center;
      max-width: 80%
    }
  </style>
</head>

<body>
  <!-- Lightbox Modal -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" alt="Büyük Görsel" />
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- Hero window -->
  <div class="window">
    <div class="titlebar">
      <div class="diamond"><img src="{{ url_for('static', filename='makinemuh.jpg') }}" alt="Makine" /></div>
      <div class="title">Makine Mühendisliği Kulübü</div>
    </div>
    <div class="content">
      <div id="heroEmpty" style="display:none; text-align:center; color:var(--muted);">Henüz gönderi yok.</div>
      <div id="hero" class="hero" style="display:none;">
        <div class="hero-frame">
          <div class="hero-inner">
            <img id="heroImg" class="hero-img" alt="Son Gönderi" />
          </div>
        </div>
        <div class="hero-meta"><span id="heroDate"></span> • <span id="heroTitle" class="hero-title"></span></div>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="grid" id="archiveGrid"></div>
    </div>
  </div>

  <!-- Table window (Etkinlik Takvimi) -->
  <div class="window">
    <div class="titlebar">
      <div class="diamond"><img src="{{ url_for('static', filename='makinemuh.jpg') }}" alt="Makine" /></div>
      <div class="title">Etkinlik Takvimi</div>
    </div>
    <div class="content">
      <table aria-label="Etkinlik Takvimi">
        <thead>
          <tr>
            <th>Tarih</th>
            <th>Başlık</th>
            <th>Yer</th>
          </tr>
        </thead>
        <tbody id="eventsTable">
          <!-- Populated later or remain empty gracefully -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const CLUB_NAME = 'Makine Mühendisliği Kulübü';
    function renderHero(item) {
      const hero = document.getElementById('hero');
      const img = document.getElementById('heroImg');
      const dateEl = document.getElementById('heroDate');
      const titleEl = document.getElementById('heroTitle');
      const d = new Date(item.yuklenme_tarihi);
      const dateStr = d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
      img.src = item.dosya_url; dateEl.textContent = dateStr; titleEl.textContent = item.aciklama || 'Gönderi';
      document.getElementById('heroEmpty').style.display = 'none'; hero.style.display = 'grid';
    }
    function renderArchive(items) {
      const grid = document.getElementById('archiveGrid');
      grid.innerHTML = items.map(item => {
        const d = new Date(item.yuklenme_tarihi);
        const dateStr = d.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
        return `
          <article class="card" role="button" tabindex="0" data-id="${item.id}" data-src="${item.dosya_url}" data-caption="${item.aciklama || 'Gönderi'}" aria-label="Fotoğrafı büyüt">
            <div class="card-head"><div class="card-title">${item.aciklama || 'Gönderi'}</div></div>
            <div class="card-body">
              <div class="thumb"><img src="${item.dosya_url}" alt="Gönderi" /></div>
              <div style="margin-top:8px; color:var(--muted);">${dateStr}</div>
            </div>
          </article>
        `;
      }).join('');
      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const src = card.getAttribute('data-src');
          const caption = card.getAttribute('data-caption');
          openLightbox(src, caption);
        });
        card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
      });
    }
    async function loadMakine() {
      try {
        const res = await fetch(`/api/makinemuh/news?kulup_adi=${encodeURIComponent(CLUB_NAME)}`);
        if (!res.ok) throw new Error('Fetch failed');
        const items = await res.json();
        if (!items || items.length === 0) { document.getElementById('heroEmpty').style.display = 'block'; return; }
        renderHero(items[0]); renderArchive(items.slice(1));
      } catch (e) { document.getElementById('heroEmpty').style.display = 'block'; }
    }
    document.addEventListener('DOMContentLoaded', loadMakine);

    // Lightbox functions
    function openLightbox(src, caption) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxCaption').textContent = caption || '';
      document.getElementById('lightbox').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>

</html>
