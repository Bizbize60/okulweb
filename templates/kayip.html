<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampüs Kayıp Eşya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2c2c2c;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --border-radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding: 20px; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px 0; }
        .logo { display: flex; align-items: center; font-size: 1.2rem; font-weight: 700; gap: 10px; }
        .search-bar { background-color: var(--bg-input); padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; width: 400px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-primary { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
        .icon-btn { background: var(--bg-input); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        /* --- TABS --- */
        .main-container { max-width: 1200px; margin: 0 auto; }
        .tabs { margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 10px 20px; font-size: 1rem; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: 600; }

        /* --- STATS --- */
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background-color: var(--bg-card); padding: 20px; border-radius: var(--border-radius); flex: 1; display: flex; align-items: center; justify-content: space-between; }
        .stat-info h3 { font-size: 0.9rem; color: var(--text-muted); font-weight: 400; }
        .stat-info span { font-size: 2rem; font-weight: 700; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .bg-red-soft { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .bg-green-soft { background-color: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* --- FILTERS --- */
        .filter-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .categories { display: flex; gap: 10px; flex-wrap: wrap; }
        .category-chip { background-color: transparent; border: 1px solid #333; color: var(--text-muted); padding: 6px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .category-chip.active, .category-chip:hover { background-color: var(--primary); border-color: var(--primary); color: white; }

        /* --- GRID --- */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .item-card { background-color: var(--bg-card); border-radius: var(--border-radius); overflow: hidden; transition: transform 0.2s; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-image { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-title { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 700; }
        .status-kayip { background-color: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .status-bulunan { background-color: rgba(16, 185, 129, 0.15); color: var(--success); }
        .meta-info { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; }
        .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 15px; margin-top: 10px; }
        .card-user { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .details-link { color: var(--primary); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; cursor: pointer;}

        /* --- MODAL --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 500px; max-width: 90%; position: relative; }
        .modal h2 { margin-bottom: 20px; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--bg-input); border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
        .form-group input[type="file"] { padding: 5px; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .search-bar { width: 100%; }
            .header-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i> Kampüs Kayıp Eşya
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass" style="color: #666;"></i>
            <input type="text" id="searchInput" placeholder="Eşya ara (örn: Cüzdan, Anahtar)...">
        </div>
        <div class="header-actions">
            <button class="btn-primary" onclick="openModal()">+ İlan Ver</button>
            <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
        </div>
    </header>

    <div class="main-container">
        
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('kayip')"><i class="fa-solid fa-magnifying-glass"></i> Kayıp Eşyalar</button>
            <button class="tab-btn" onclick="switchTab('bulunan')"><i class="fa-solid fa-box-open"></i> Bulunan Eşyalar</button>
        </nav>

        <section class="stats-row">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Toplam Kayıp</h3>
                    <span id="stat-kayip">0</span>
                </div>
                <div class="stat-icon bg-red-soft"><i class="fa-solid fa-triangle-exclamation"></i></div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Bulunan</h3>
                    <span id="stat-bulunan">0</span>
                </div>
                <div class="stat-icon bg-green-soft"><i class="fa-solid fa-check-circle"></i></div>
            </div>
        </section>

        <section class="filter-section">
            <div class="categories" id="categories">
                <span class="category-chip active" onclick="filterCategory('Tümü')">Tümü</span>
                <span class="category-chip" onclick="filterCategory('Elektronik')">Elektronik</span>
                <span class="category-chip" onclick="filterCategory('Kıyafet')">Kıyafet</span>
                <span class="category-chip" onclick="filterCategory('Çanta')">Çanta</span>
                <span class="category-chip" onclick="filterCategory('Diğer')">Diğer</span>
            </div>
        </section>

        <h2 class="section-title" id="listTitle"><i class="fa-solid fa-circle-exclamation"></i> Kayıp Eşyalar</h2>
        
        <div class="items-grid" id="itemsGrid">
            <p style="color: #666;">Yükleniyor...</p>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2>Yeni İlan Oluştur</h2>
            <form id="addForm">
                <div class="form-group">
                    <label>İlan Tipi</label>
                    <select name="tip" required>
                        <option value="kayip">Kayıp</option>
                        <option value="bulunan">Bulunan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Başlık</label>
                    <input type="text" name="baslik" placeholder="Örn: Siyah Nike Çanta" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select name="kategori">
                        <option value="Diğer">Diğer</option>
                        <option value="Elektronik">Elektronik</option>
                        <option value="Kıyafet">Kıyafet</option>
                        <option value="Çanta">Çanta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Konum (Nerede Kayboldu/Bulundu?)</label>
                    <input type="text" name="konum" placeholder="Örn: Kafeterya">
                </div>
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea name="aciklama" rows="3" placeholder="Detaylar..."></textarea>
                </div>
                <div class="form-group">
                    <label>Fotoğraf</label>
                    <input type="file" name="file" accept="image/*">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Yayınla</button>
            </form>
        </div>
    </div>

    <script>
        // Global Değişkenler
        let currentTab = 'kayip';
        let currentCategory = 'Tümü';

        // Sayfa Yüklendiğinde
        document.addEventListener('DOMContentLoaded', () => {
            fetchStats();
            fetchItems();
        });

        // 1. İlanları Getir
        async function fetchItems() {
            const grid = document.getElementById('itemsGrid');
            const searchVal = document.getElementById('searchInput').value;
            grid.innerHTML = '<p style="color: #666;">Yükleniyor...</p>';

            try {
                let url = `/api/kayiplar?tip=${currentTab}`;
                if (currentCategory !== 'Tümü') url += `&kategori=${currentCategory}`;
                if (searchVal) url += `&q=${searchVal}`;

                const res = await fetch(url);
                const data = await res.json();

                renderItems(data);
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p style="color: var(--danger);">Veriler yüklenirken hata oluştu.</p>';
            }
        }

        // 2. İlanları Ekrana Bas
        function renderItems(items) {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';

            if (items.length === 0) {
                grid.innerHTML = '<p style="color: #666;">Bu kategoride ilan bulunamadı.</p>';
                return;
            }

            items.forEach(item => {
                const badgeClass = item.tip === 'kayip' ? 'status-kayip' : 'status-bulunan';
                const badgeText = item.tip === 'kayip' ? 'Kayıp' : 'Bulunan';
                
                const cardHTML = `
                <article class="item-card">
                    <img src="${item.foto}" alt="${item.baslik}" class="card-image">
                    <div class="card-content">
                        <div class="card-header">
                            <h3 class="card-title">${item.baslik}</h3>
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="meta-info">
                            <div class="meta-row"><i class="fa-solid fa-location-dot"></i> ${item.konum || 'Konum Belirtilmemiş'}</div>
                            <div class="meta-row"><i class="fa-regular fa-calendar"></i> ${item.tarih_str}</div>
                            <div class="meta-row" style="font-size:0.8rem; margin-top:5px;">${item.aciklama || ''}</div>
                        </div>
                        <div class="card-footer">
                            <div class="card-user">
                                <i class="fa-regular fa-user-circle" style="font-size: 1.2rem;"></i>
                                <span>${item.user_name}</span>
                            </div>
                            <span class="details-link">Detaylar <i class="fa-solid fa-arrow-right"></i></span>
                        </div>
                    </div>
                </article>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // 3. İstatistikleri Getir
        async function fetchStats() {
            try {
                const res = await fetch('/api/kayiplar/stats');
                const data = await res.json();
                document.getElementById('stat-kayip').innerText = data.kayip;
                document.getElementById('stat-bulunan').innerText = data.bulunan;
            } catch (err) { console.error(err); }
        }

        // 4. Tab Değiştirme (Kayıp / Bulunan)
        function switchTab(tab) {
            currentTab = tab;
            
            // Tab butonlarını güncelle
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Başlığı güncelle
            const titleEl = document.getElementById('listTitle');
            if(tab === 'kayip') {
                titleEl.innerHTML = '<i class="fa-solid fa-circle-exclamation" style="color:var(--danger)"></i> Kayıp Eşyalar';
            } else {
                titleEl.innerHTML = '<i class="fa-solid fa-check-circle" style="color:var(--success)"></i> Bulunan Eşyalar';
            }

            fetchItems();
        }

        // 5. Kategori Filtreleme
        function filterCategory(category) {
            currentCategory = category;
            
            // Chip stillerini güncelle
            document.querySelectorAll('.category-chip').forEach(chip => chip.classList.remove('active'));
            event.currentTarget.classList.add('active');

            fetchItems();
        }

        // 6. Arama Fonksiyonu
        document.getElementById('searchInput').addEventListener('input', (e) => {
            // Debounce yapılabilir ama basit tutuyoruz
            fetchItems();
        });

        // --- MODAL İŞLEMLERİ ---
        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }
        
        // Modal dışına tıklayınca kapatma
        window.onclick = function(event) {
            if (event.target == document.getElementById('addModal')) {
                closeModal();
            }
        }

        // İlan Gönderme (Form Submit)
        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Yükleniyor...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/kayip-ekle', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    alert('İlan başarıyla eklendi!');
                    closeModal();
                    this.reset();
                    fetchItems(); // Listeyi yenile
                    fetchStats(); // İstatistikleri yenile
                } else {
                    const err = await res.json();
                    alert('Hata: ' + err.message);
                }
            } catch (error) {
                alert('Bir hata oluştu.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
