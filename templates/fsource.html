<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSource • Free Software Open Source Community</title>
  <style>
    /* 90s tiled background */
    body {
      margin: 0;
      font-family: "MS Sans Serif", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #000000;
      background-color: #c0c0c0;
      background-image:
        linear-gradient(45deg, #b8b8b8 25%, transparent 25%),
        linear-gradient(-45deg, #b8b8b8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #b8b8b8 75%),
        linear-gradient(-45deg, transparent 75%, #b8b8b8 75%);
      background-size: 4px 4px;
      background-position: 0 0, 0 2px, 2px -2px, -2px 0px;
    }
    a { color: #0000ff; text-decoration: underline; }
    a:visited { color: #800080; }
    a:hover, a:active { color: #ff0000; }

    /* Rainbow text */
    @keyframes rainbow {
      0% { color: #ff0000; }
      17% { color: #ff8000; }
      33% { color: #ffff00; }
      50% { color: #00ff00; }
      67% { color: #0080ff; }
      83% { color: #8000ff; }
      100% { color: #ff0000; }
    }
    .text-rainbow { animation: rainbow 4s linear infinite; font-family: "Arial Black", Impact, Haettenschweiler, sans-serif; text-shadow: 2px 2px 0 #808080; }

    /* Pulse glow for NEW badge */
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5); }
    }
    .badge-new { display:inline-block; padding:2px 6px; background:#ff0000; color:#ffffff; font-weight:bold; border:2px solid; border-color:#ffffff #808080 #808080 #ffffff; box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #dfdfdf; animation: pulse-glow 1.5s ease-in-out infinite; }

    /* Window card */
    .window {
      max-width: 1024px; margin: 12px auto; background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #dfdfdf;
    }
    .titlebar {
      background: linear-gradient(to right, #000080, #1084d0); color: #ffffff; padding: 8px 12px; font-weight: bold; font-family: "Arial Black", Impact, sans-serif; display:flex; align-items:center; gap:8px;
    }
    .titlebar .logo { width: 32px; height: 32px; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #dfdfdf; background:#ffffff; display:flex; align-items:center; justify-content:center; }
    .content { background: #ffffcc; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf; padding: 12px; }

    /* HR groove */
    .hr-groove { border:none; height:4px; background: linear-gradient(to bottom, #808080 0%, #808080 50%, #ffffff 50%, #ffffff 100%); margin: 16px 0; }

    /* Buttons */
    .btn { display:inline-block; padding:8px 16px; background:#c0c0c0; color:#000; text-transform:uppercase; font-weight:bold; border:2px solid; border-color:#ffffff #808080 #808080 #ffffff; box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #dfdfdf; }
    .btn:focus-visible { outline:2px dotted #000000; outline-offset:2px; }
    .btn:active { border-color:#808080 #ffffff #ffffff #808080; box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf; transform: translate(1px,1px); }

    /* Hero + archive */
    .hero { display:grid; grid-template-columns: 1fr; gap: 16px; }
    .hero-img { width:100%; height: 280px; background:#ffffff; border:2px solid; border-color:#808080 #ffffff #ffffff #808080; box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf; }
    .hero-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .hero-meta { font-family: "Courier New", Courier, monospace; font-size:12px; color:#000; }

    .grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .card { background:#c0c0c0; border:2px solid; border-color:#ffffff #808080 #808080 #ffffff; box-shadow: inset -1px -1px 0 #404040, inset 1px 1px 0 #dfdfdf; padding:8px; }
    .thumb { height:140px; background:#ffffff; border:2px solid; border-color:#808080 #ffffff #ffffff #808080; box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf; overflow:hidden; }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    /* Hit counter */
    .counter { background:#000000; color:#00ff00; font-family:"Courier New", monospace; padding:8px; border:2px solid; border-color:#808080 #ffffff #ffffff #808080; box-shadow: inset 1px 1px 0 #404040, inset -1px -1px 0 #dfdfdf; }

    /* Construction stripes */
    .construction { background: repeating-linear-gradient(45deg, #ffff00, #ffff00 10px, #000000 10px, #000000 20px); padding: 6px; border: 2px solid; border-color:#ffffff #808080 #808080 #ffffff; }

    /* Responsive */
    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .hero-img { height: 240px; }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .hero-img { height: 200px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .text-rainbow { animation: none; color: #ff0000; }
      .badge-new { animation: none; }
    }

    /* Lightbox Modal */
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:none;align-items:center;justify-content:center;cursor:zoom-out}
    .lightbox.show{display:flex}
    .lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border:4px solid;border-color:#ffffff #808080 #808080 #ffffff;box-shadow:inset -2px -2px 0 #404040, inset 2px 2px 0 #dfdfdf}
    .lightbox-close{position:absolute;top:20px;right:30px;color:#fff;font-size:40px;cursor:pointer;font-family:'Arial Black',sans-serif}
    .lightbox-close:hover{color:#ff0000}
    .lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#000;color:#00ff00;font-family:'Courier New',monospace;padding:8px 16px;border:2px solid #00ff00}
  </style>
</head>
<body>
  <!-- Lightbox Modal -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" alt="Büyük Görsel" />
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <!-- Marquee announcement -->
  <div class="window" aria-live="polite">
    <div class="titlebar">
      <div class="logo"><img src="{{ url_for('static', filename='fsource-toplulugu.jpg') }}" alt="FSource" style="width:28px;height:28px;" /></div>
      <div>FSource • Free Software Open Source Community</div>
    </div>
    <div class="content">
      <marquee behavior="scroll" direction="left" scrollamount="40">
        <span style="color:#0000ff; font-weight:bold;">WELCOME TO 1997 • </span>
        <span style="color:#ff0000; font-weight:bold;">FREE SOFTWARE • </span>
        <span style="color:#0080ff; font-weight:bold;">OPEN SOURCE • </span>
        <span style="color:#00aa00; font-weight:bold;">LINUX FOREVER • </span>
        <span style="color:#ffff00; font-weight:bold;">DOWNLOADS • TUTORIALS • COMMUNITY</span>
      </marquee>
    </div>
  </div>

  <!-- Hero window: latest post -->
  <div class="window">
    <div class="titlebar">
      <div class="logo"><img src="{{ url_for('static', filename='fsource-toplulugu.jpg') }}" alt="FSource" style="width:28px;height:28px;" /></div>
      <div class="text-rainbow" style="font-size:36px;">FSource Main Page</div>
      <span class="badge-new" aria-label="Yeni">NEW!</span>
    </div>
    <div class="content">
      <div id="heroEmpty" style="display:none; text-align:center;">Henüz gönderi yok.</div>
      <div id="hero" class="hero" style="display:none;">
        <div class="hero-img"><img id="heroImg" alt="Son Gönderi" /></div>
        <div class="hero-meta"><span id="heroDate"></span> • <span id="heroTitle"></span></div>
      </div>
      <hr class="hr-groove" />
      
    </div>
  </div>

  <!-- Archive window -->
  <div class="window">
    <div class="titlebar">
      <div class="logo"><img src="{{ url_for('static', filename='fsource-toplulugu.jpg') }}" alt="FSource" style="width:28px;height:28px;" /></div>
      <div>ESKI GÖNDERİLER</div>
    </div>
    <div class="content">
      <div id="archiveGrid" class="grid"></div>
    </div>
  </div>

  <!-- CTA window with construction stripes -->
  <div class="window">
    <div class="titlebar">
      <div class="logo"><img src="{{ url_for('static', filename='fsource-toplulugu.jpg') }}" alt="FSource" style="width:28px;height:28px;" /></div>
      <div>DOWNLOADS & LINKS</div>
    </div>
    <div class="content">
      <div class="construction">
        <p>
          <a href="https://www.linux.org/" target="_blank" rel="noopener">Linux Guides</a>
          •
          <a href="https://www.kernel.org/doc/html/latest/" target="_blank" rel="noopener">Kernel Notes</a>
          •
          <a href="https://www.linuxquestions.org/" target="_blank" rel="noopener">Community Forum</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const CLUB_NAME = 'FSource';
    function renderHero(item) {
      const hero = document.getElementById('hero');
      const heroImg = document.getElementById('heroImg');
      const heroDate = document.getElementById('heroDate');
      const heroTitle = document.getElementById('heroTitle');
      const d = new Date(item.yuklenme_tarihi);
      const dateStr = d.toLocaleDateString('tr-TR', { year:'numeric', month:'long', day:'numeric' });
      heroImg.src = item.dosya_url;
      heroDate.textContent = dateStr;
      heroTitle.textContent = item.aciklama || 'Gönderi';
      document.getElementById('heroEmpty').style.display = 'none';
      hero.style.display = 'grid';
    }
    function renderArchive(items) {
      const grid = document.getElementById('archiveGrid');
      grid.innerHTML = items.map(item => {
        const d = new Date(item.yuklenme_tarihi);
        const dateStr = d.toLocaleDateString('tr-TR', { year:'numeric', month:'long', day:'numeric' });
        return `
          <div class="card" role="button" tabindex="0" data-id="${item.id}" data-src="${item.dosya_url}" data-caption="${item.aciklama || 'Gönderi'}" aria-label="Fotoğrafı büyüt">
            <div class="thumb"><img src="${item.dosya_url}" alt="Gönderi" /></div>
            <div style="margin-top:6px; font-family:'Courier New',monospace; font-size:12px;">${dateStr}</div>
            <div style="font-weight:bold;">${item.aciklama || 'Gönderi'}</div>
          </div>
        `;
      }).join('');
      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const src = card.getAttribute('data-src');
          const caption = card.getAttribute('data-caption');
          openLightbox(src, caption);
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault(); card.click();
          }
        });
      });
    }
    async function loadFSource() {
      try {
        const res = await fetch(`/api/fsource/news?kulup_adi=${encodeURIComponent(CLUB_NAME)}`);
        if (!res.ok) throw new Error('Fetch failed');
        const items = await res.json();
        if (!items || items.length === 0) {
          document.getElementById('heroEmpty').style.display = 'block';
          return;
        }
        renderHero(items[0]);
        renderArchive(items.slice(1));
      } catch (e) {
        document.getElementById('heroEmpty').style.display = 'block';
      }
    }
    document.addEventListener('DOMContentLoaded', loadFSource);

    // Lightbox functions
    function openLightbox(src, caption) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxCaption').textContent = caption || '';
      document.getElementById('lightbox').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
